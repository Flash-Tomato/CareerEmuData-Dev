name: CI

on:
  release:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14
        python-version: ["3.11", "3.14"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      env:
        CAREER_EMULATOR_DATASET_SOURCE: "distribution"
      run: |
        python -m pip install --upgrade pip
        pip install "career-emulator[bdci]"

    - name: Run tests
      run: |
        career-emulator update --source distribution
        echo q | career-emulator play
